<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin & Sales - BMpro</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h1 { color: #2c3e50; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 600;
    }
    .debug {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      text-align: left;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Panel Admin & Sales</h1>
    <p>Sistem manajemen properti BMpro</p>
    <a href="login.html" class="btn" id="loginBtn">Login ke Panel</a>
    
    <div class="debug" id="debugInfo">
      🔍 Memeriksa file login.html...
    </div>
  </div>

  <script>
    // Cek apakah login.html bisa diakses
    fetch('login.html', { method: 'HEAD' })
      .then(response => {
        if (response.ok) {
          document.getElementById('debugInfo').innerHTML = '✅ File login.html ditemukan. Klik tombol di atas untuk login.';
        } else {
          document.getElementById('debugInfo').innerHTML = '❌ File login.html TIDAK DITEMUKAN (HTTP ' + response.status + '). Periksa apakah file sudah diupload ke repository.';
        }
      })
      .catch(error => {
        document.getElementById('debugInfo').innerHTML = '❌ Gagal memeriksa login.html: ' + error.message;
      });
  </script>
</body>
</html>
