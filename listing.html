<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>BMpro - Listing Properti</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 90px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 25px; }
    .header h1 { color: #2c3e50; font-size: 1.8rem; font-weight: 700; }
    .header p { color: #666; font-size: 0.85rem; }
    
    /* Tabs lebih kecil */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: white;
      padding: 6px;
      border-radius: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .tab-btn {
      flex: 1;
      padding: 6px 10px;
      border: none;
      background: transparent;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
    }
    .property-card {
      background: white;
      border-radius: 20px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: opacity 0.3s ease;
    }
    .property-card.loading {
      opacity: 0.5;
      pointer-events: none;
    }
    .property-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #f0f0f0;
    }
    .property-info { padding: 12px; }
    .property-title { font-size: 1rem; font-weight: 700; color: #2c3e50; }
    .property-location { font-size: 0.7rem; color: #888; margin: 4px 0; }
    .property-price { font-size: 1rem; font-weight: 700; color: #3498db; margin: 4px 0; }
    .property-specs { display: flex; gap: 12px; font-size: 0.65rem; color: #666; margin: 6px 0; }
    .property-specs span i { margin-right: 4px; color: #3498db; }
    .property-sales { font-size: 0.65rem; color: #888; border-top: 1px solid #eee; padding-top: 8px; margin-top: 5px; }
    .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .btn-edit {
      flex: 1;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      border: none;
      padding: 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-edit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-delete {
      flex: 1;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      border: none;
      padding: 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-delete:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 20px; }
    .empty-state i { font-size: 3rem; color: #ccc; margin-bottom: 15px; }
    .loading-state { text-align: center; padding: 50px; }
    
    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;

      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: 0.3s;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content {
      background: white;
      border-radius: 24px;
      max-width: 550px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #3498db;
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #999;
    }
    .modal-form-group { margin-bottom: 15px; }
    .modal-form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
    }
    .modal-form-group input, .modal-form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
    }
    .image-upload-area {
      border: 2px dashed #ccc;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
    }
    .image-preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 10px;
      overflow: hidden;
      background: #f0f0f0;
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      padding: 2px;
      color: white;
    }
    .preview-label.old { background: #3498db; }
    .preview-label.new { background: #27ae60; }
    .btn-save {
      width: 100%;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn-save:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .section-divider {
      font-weight: 700;
      margin: 15px 0 10px 0;
      padding-bottom: 5px;
      border-bottom: 1px solid #ddd;
      color: #2c3e50;
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);

    .nav-item {
      display: flex;
      flex-direction: column;

    }
    .nav-item.active { color: #3498db; }
    .nav-item i { font-size: 1.2rem; }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c3e50;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.8rem;
      z-index: 200;
      display: none;
    }
    .btn-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid white;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .property-viewers{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:#666;
    margin-top:4px;
    margin-bottom:6px;
  }
  
  .property-viewers i{
    color:#3498db;
    font-size:11px;
  }

  <div id="toast" class="toast"></div>

  <script>
    // =====================================================
    // KONFIGURASI HYBRID: OpenSheet untuk Load, Apps Script untuk Update/Delete
    // =====================================================
    const SHEET_ID = '1mosLZD23_3YDcuzi2diUY2TRNBSigJ2HNiiiFGPWtzo';
    const OPENSHEET_URL = `https://opensheet.elk.sh/${SHEET_ID}`;
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxixVx090ahp3wava6yfTT5u3BqCN6vFRzWbpbcDvcTKX79P0FlOZwFRhMnPzBzHqT3/exec';
    
    let currentCategory = 'primary';
    let currentUser = null;
    let currentData = [];
    let editNewImages = { main: null, img2: null, img3: null, img4: null, img5: null };
    let isLoading = false;

    // =====================================================
    // AUTHENTICATION
    // =====================================================
    async function checkAuth() {

    try {

      const userStr = localStorage.getItem('bmpro_user');

      console.log('LOCAL USER:', userStr);

      if (!userStr) {
        window.location.href = 'login.html';
        return false;
      }

      currentUser = JSON.parse(userStr);

      console.log('PARSED USER:', currentUser);

      if (!currentUser) {
        logout();
        return false;
      }

      if (
        currentUser.role !== 'admin' &&
        currentUser.role !== 'host'
      ) {
        logout();
        return false;
      }

      return true;

    } catch (err) {

      console.error('CHECK AUTH ERROR:', err);

      logout();

      return false;
    }
    }

    function logout() { 
    localStorage.removeItem('bmpro_user'); 
    window.location.href = 'login.html'; 
    }


    function normalizePhone(phone) {

    if (!phone) return '';

    let cleaned =
      phone.toString().replace(/\D/g, '');

    // 08123 -> 628123
    if (cleaned.startsWith('0')) {
      cleaned = '62' + cleaned.substring(1);
    }

    // 8123 -> 628123
    if (!cleaned.startsWith('62')) {
      cleaned = '62' + cleaned;
    }

    return cleaned;

    }

    // =====================================================
    // LOAD DATA PAKAI OPENSHEET (GAMBAR LANGSUNG MUNCUL)
    // =====================================================
    async function loadData() {
      if (isLoading) return;
      isLoading = true;
      
      const container = document.getElementById('propertyList');
      container.innerHTML = `<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Memuat data ${currentCategory}...</div>`;
      
      try {
        // 🔥 PAKAI OPENSHEET UNTUK AMBIL DATA
        const response = await fetch(
          `${OPENSHEET_URL}/${currentCategory}?t=${Date.now()}`
        );
        const data = await response.json();
        
        if (data && data.length > 0) {

// FILTER DATA KOSONG
let filteredData = data.filter(row =>
  row['nama property'] &&
  row['nama property'].trim() !== ''
);

// FILTER KHUSUS HOST
if (currentUser.role === 'host') {

filteredData = filteredData.filter(row => {

  return (
    normalizePhone(row.kontak) ===
    normalizePhone(currentUser.kontak)
  );

});

}

  filteredData = filteredData.map((row, idx) => ({
    ...row,
    __rowIndex: idx + 2
  }));

  currentData = filteredData;

  displayData(filteredData);

} else {
          container.innerHTML = `<div class="empty-state"><i class="fas fa-building"></i><p>Belum ada properti di ${currentCategory}</p></div>`;
        }
      } catch (error) {
        console.error('OpenSheet error:', error);
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Gagal memuat data</p></div>`;
      } finally {
        isLoading = false;
      }
    }

    // ========== KONVERSI URL GOOGLE DRIVE KE THUMBNAIL ==========
    function convertDriveUrl(url) {
      if (!url) return '';
      if (url.includes('lh3.googleusercontent.com')) return url;
      
      // Pattern: /d/FILE_ID/
      const fileIdMatch = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (fileIdMatch) {
        return `https://lh3.googleusercontent.com/d/${fileIdMatch[1]}=w400`;
      }
      
      // Pattern: ?id=FILE_ID
      const ucIdMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (ucIdMatch) {
        return `https://lh3.googleusercontent.com/d/${ucIdMatch[1]}=w400`;
      }
      
      // Pattern: langsung FILE_ID
      if (url.match(/^[a-zA-Z0-9_-]{25,}$/)) {
        return `https://lh3.googleusercontent.com/d/${url}=w400`;
      }
      
      return url;
    }

    // =====================================================
    // FORMATTER & HELPER
    // =====================================================
    function formatPrice(price) {
      if (!price) return 'Rp 0';
      const num = parseInt(price.toString().replace(/[^0-9]/g, '') || 0);
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // =====================================================
    // DISPLAY DATA (dengan referrerpolicy agar gambar muncul)
    // =====================================================
          function displayData(data) {
        const container = document.getElementById('propertyList');
        container.innerHTML = data.map((item, idx) => `
          <div class="property-card" data-idx="${idx}">
            <img class="property-image" src="${convertDriveUrl(item['gambar utama']) || 'https://via.placeholder.com/400x200?text=No+Image'}" 
                onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
            <div class="property-info">

            <div class="property-title">${escapeHtml(item['nama property'] || '-')}</div>
            <div class="property-viewers">
            <i class="fas fa-eye"></i>${item['viewer'] || 0} Dilihat</div>
            <div class="property-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(item.lokasi || '-')}</div>
            <div class="property-price">${formatPrice(item.harga)}</div>
            <div class="property-specs">
              <span><i class="fas fa-bed"></i> ${item.kt || 0} KT</span>
              <span><i class="fas fa-bath"></i> ${item.km || 0} KM</span>
              <span><i class="fas fa-vector-square"></i> ${item.lt || 0} m²</span>
            </div>
            <div class="property-sales">
              <i class="fas fa-user"></i> ${escapeHtml(item.sales || '-')} &nbsp;|&nbsp;
              <i class="fab fa-whatsapp"></i> ${escapeHtml(item.kontak || '-')}
            </div>
            <div class="action-buttons">
              <button class="btn-edit" onclick="openEditModal(${idx})"><i class="fas fa-edit"></i> Update</button>
              <button class="btn-delete" onclick="deleteItem(${idx})"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // =====================================================
    // COMPRESS IMAGE
    // =====================================================
    async function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            const maxSize = 800;
            if (width > maxSize || height > maxSize) {
              if (width > height) { height = (height * maxSize) / width; width = maxSize; }
              else { width = (width * maxSize) / height; height = maxSize; }
            }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.onerror = reject;
        };
        reader.onerror = reject;
      });
    }

    // =====================================================
    // PREVIEW EDIT IMAGE
    // =====================================================
    async function previewEditImage(input, imageKey) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) { alert('Maksimal 10MB'); input.value = ''; return; }
      
      const previewMap = { main:'editPreviewMain', img2:'editPreviewImg2', img3:'editPreviewImg3', img4:'editPreviewImg4', img5:'editPreviewImg5' };
      const previewDiv = document.getElementById(previewMap[imageKey]);
      
      previewDiv.innerHTML = `<div class="preview-item"><i class="fas fa-spinner fa-pulse"></i></div>`;
      
      try {
        const compressed = await compressImage(file);
        // 🔥 PERUBAHAN: tambahkan referrerpolicy dan crossorigin
        previewDiv.innerHTML = `<div class="preview-item"><img src="${compressed}" referrerpolicy="no-referrer" crossorigin="anonymous"><div class="preview-label new">Baru</div></div>`;
        editNewImages[imageKey] = compressed;
      } catch(e) { 
        previewDiv.innerHTML = '<div class="preview-item" style="color:red;">Gagal</div>'; 
        input.value = ''; 
      }
    }

    // =====================================================
    // LOADING STATE HELPER
    // =====================================================
    function setCardLoading(index, isLoading) {
      const card = document.querySelector(`.property-card[data-idx="${index}"]`);
      if (card) {
        if (isLoading) {
          card.classList.add('loading');
        } else {
          card.classList.remove('loading');
        }
      }
    }

    function setButtonLoading(button, isLoading, originalText) {
      if (isLoading) {
        button.disabled = true;
        button.innerHTML = `<span class="btn-spinner"></span> ${originalText || 'Processing...'}`;
      } else {
        button.disabled = false;
        button.innerHTML = originalText || button.innerHTML;
      }
    }

    // =====================================================
    // OPEN EDIT MODAL (data dari OpenSheet sudah benar)
    // =====================================================
    function openEditModal(index) {
      const item = currentData[index];
      if (!item) return;
      editNewImages = { main: null, img2: null, img3: null, img4: null, img5: null };
      
      document.getElementById('editMainImage').value = '';
      document.getElementById('editImage2').value = '';
      document.getElementById('editImage3').value = '';
      document.getElementById('editImage4').value = '';
      document.getElementById('editImage5').value = '';
      
      document.getElementById('editRowIndex').value = index;
      document.getElementById('editCategory').value = currentCategory;
      document.getElementById('editPropertyName').value = item['nama property'] || '';
      document.getElementById('editPrice').value = item.harga || '';
      document.getElementById('editLocation').value = item.lokasi || '';
      document.getElementById('editContact').value = item.kontak || '';
      document.getElementById('editKt').value = item.kt || '';
      document.getElementById('editKm').value = item.km || '';
      document.getElementById('editLt').value = item.lt || '';
      document.getElementById('editSpecification').value = item.spesifikasi || '';
      
      document.getElementById('editOldMainImage').value = item['gambar utama'] || '';
      document.getElementById('editOldImage2').value = item.gambar2 || '';
      document.getElementById('editOldImage3').value = item.gambar3 || '';
      document.getElementById('editOldImage4').value = item.gambar4 || '';
      document.getElementById('editOldImage5').value = item.gambar5 || '';
      
      displayOldPreview('editPreviewMain', item['gambar utama']);
      displayOldPreview('editPreviewImg2', item.gambar2);
      displayOldPreview('editPreviewImg3', item.gambar3);
      displayOldPreview('editPreviewImg4', item.gambar4);
      displayOldPreview('editPreviewImg5', item.gambar5);
      
      document.getElementById('editModal').classList.add('show');
    }

        function displayOldPreview(containerId, url) {
      const container = document.getElementById(containerId);
      if (url && url !== '') {
        container.innerHTML = `<div class="preview-item"><img src="${convertDriveUrl(url)}" onerror="this.src='https://via.placeholder.com/80'"><div class="preview-label old">Lama</div></div>`;
      } else {
        container.innerHTML = `<div class="preview-item" style="display:flex;align-items:center;justify-content:center;"><i class="fas fa-image"></i></div>`;
      }
    }

    function closeModal() {

    document
      .getElementById('editModal')
      .classList.remove('show');

    }

    // Klik area hitam untuk tutup modal
    document.getElementById('editModal')
    .addEventListener('click', function(e) {

      if (e.target === this) {

        closeModal();

      }

    });

    // =====================================================
    // SAVE EDIT PAKAI APPS SCRIPT (untuk update data & gambar)
    // =====================================================
    async function saveEdit() {
      const saveBtn = document.getElementById('saveChangesBtn');
      const originalBtnText = saveBtn.innerHTML;
      
      setButtonLoading(saveBtn, true, 'Menyimpan...');
      
      const index = parseInt(document.getElementById('editRowIndex').value);
      const category = document.getElementById('editCategory').value;
      
      setCardLoading(index, true);
      
      const payload = {
        action: 'updatePropertyWithImages',
        role: currentUser.role,
        kontak_user: currentUser.kontak,
        category: category,
        rowIndex: currentData[index].__rowIndex,
        nama_property: document.getElementById('editPropertyName').value.trim(),
        harga: document.getElementById('editPrice').value.trim(),
        lokasi: document.getElementById('editLocation').value.trim(),
        kontak: document.getElementById('editContact').value.trim(),
        kt: document.getElementById('editKt').value,
        km: document.getElementById('editKm').value,
        lt: document.getElementById('editLt').value,
        spesifikasi: document.getElementById('editSpecification').value.trim(),
        old_gambar_utama: document.getElementById('editOldMainImage').value,
        old_gambar2: document.getElementById('editOldImage2').value,
        old_gambar3: document.getElementById('editOldImage3').value,
        old_gambar4: document.getElementById('editOldImage4').value,
        old_gambar5: document.getElementById('editOldImage5').value,
        new_gambar_utama: editNewImages.main || '',
        new_gambar2: editNewImages.img2 || '',
        new_gambar3: editNewImages.img3 || '',
        new_gambar4: editNewImages.img4 || '',
        new_gambar5: editNewImages.img5 || ''
      };
      
      if (!payload.nama_property) { 
        showToast('Nama properti wajib diisi');
        setButtonLoading(saveBtn, false, originalBtnText);
        setCardLoading(index, false);
        return; 
      }
      
      closeModal();
      showToast('🔄 Menyimpan perubahan...');
      
      try {
        const formData = new URLSearchParams();
        Object.keys(payload).forEach(key => {
          if (payload[key] !== undefined && payload[key] !== '') {
            formData.append(key, payload[key]);
          }
        });
        
        // 🔥 PAKAI APPS SCRIPT UNTUK UPDATE
        const response = await fetch(APPS_SCRIPT_URL, { 
          method: 'POST', 
          body: formData 
        });

        const text = await response.text();

      let result;

      try {

        result = JSON.parse(text);

      } catch {

        console.error('RESPON BUKAN JSON:', text);

        throw new Error('Response bukan JSON');

      }

      if (result.success) {

        showToast('✅ Data berhasil diupdate');

        await loadData();

      } else {

        showToast(
          '❌ Gagal: ' +
          (result.message || 'Unknown error')
        );

      }
      } catch (error) {
        console.error('Save error:', error);
        showToast('❌ Error: ' + error.message);
      } finally {
        setButtonLoading(saveBtn, false, originalBtnText);
        setCardLoading(index, false);
      }
    }

    // =====================================================
    // DELETE ITEM PAKAI APPS SCRIPT (hapus data & gambar)
    // =====================================================
    async function deleteItem(index) {

      const item = currentData[index];

      if (!item) {
        showToast('Data tidak ditemukan');
        return;
      }

      if (!confirm(
        `Hapus properti "${item['nama property']}"?\n\nSEMUA GAMBAR akan dihapus dari Drive!`
      )) return;

      setCardLoading(index, true);

      const card =
        document.querySelector(`.property-card[data-idx="${index}"]`);

      const deleteBtn = card?.querySelector('.btn-delete');

      if (deleteBtn) {
        setButtonLoading(
          deleteBtn,
          true,
          'Menghapus...'
        );
      }

      showToast('🔄 Menghapus data dan gambar...');

      try {

        const formData = new URLSearchParams();

        formData.append('action', 'deleteProperty');
        formData.append('category', currentCategory);

        // 🔥 PAKAI ROW INDEX
        formData.append('rowIndex', index + 2);

        formData.append('role', currentUser.role);
        formData.append('kontak_user', currentUser.kontak);

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: formData
        });

        const text = await response.text();

        let result;

        try {

          result = JSON.parse(text);

        } catch {

          console.error(
            'RESPON DELETE BUKAN JSON:',
            text
          );

          throw new Error('Response bukan JSON');

        }

        if (result.success) {

          showToast('✅ Data berhasil dihapus');

          await loadData();

        } else {

          showToast(
            '❌ Gagal hapus: ' +
            (result.message || 'Unknown error')
          );

          setCardLoading(index, false);

          if (deleteBtn) {

            setButtonLoading(
              deleteBtn,
              false,
              '<i class="fas fa-trash"></i> Delete'
            );

          }

        }

      } catch (error) {

        console.error(error);

        showToast('❌ Error: ' + error.message);

        setCardLoading(index, false);

        if (deleteBtn) {

          setButtonLoading(
            deleteBtn,
            false,
            '<i class="fas fa-trash"></i> Delete'
          );

        }

      }

    }

    let toastTimer;

    function showToast(message) {

      const toast = document.getElementById('toast');

      toast.innerText = message;

      toast.style.display = 'block';

      clearTimeout(toastTimer);

      toastTimer = setTimeout(() => {

        toast.style.display = 'none';

      }, 2500);

    }

    // =====================================================
// INITIALIZE
// =====================================================
window.addEventListener('DOMContentLoaded', async () => {

document.querySelectorAll('.tab-btn').forEach(btn => {

  btn.addEventListener('click', () => {

    if (isLoading) return;

    document.querySelectorAll('.tab-btn')
      .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    currentCategory = btn.dataset.category;

    loadData();

  });

});

  const isAuth = await checkAuth();

  if (!isAuth) return;

  loadData();

  });
  </script>
