<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Form - BMpro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f7fb;
      padding: 20px;
    }
    .form-card {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 15px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #3498db;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    img {
      width: 70px;
      margin: 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="form-card">
  <h3>Tambah Properti</h3>

  <select id="categorySelect">
    <option value="">Pilih Kategori</option>
    <option value="primary">Primary</option>
    <option value="secondary">Secondary</option>
    <option value="rent">Rent</option>
  </select>

  <input type="text" id="salesName" placeholder="Nama Sales">
  <input type="text" id="propertyName" placeholder="Nama Properti">
  <input type="text" id="price" placeholder="Harga">
  <input type="tel" id="contact" placeholder="Kontak">

  <input type="number" id="kt" placeholder="KT">
  <input type="number" id="km" placeholder="KM">
  <input type="number" id="lt" placeholder="LT">

  <input type="text" id="location" placeholder="Lokasi">
  <textarea id="specification" placeholder="Spesifikasi"></textarea>

  <p>Gambar Utama</p>
  <input type="file" id="mainImageInput" accept="image/*" onchange="preview(this, 'prev1')">
  <div id="prev1"></div>

  <p>Gambar 2</p>
  <input type="file" id="image2Input" accept="image/*" onchange="preview(this, 'prev2')">
  <div id="prev2"></div>

  <p>Gambar 3</p>
  <input type="file" id="image3Input" accept="image/*" onchange="preview(this, 'prev3')">
  <div id="prev3"></div>

  <p>Gambar 4</p>
  <input type="file" id="image4Input" accept="image/*" onchange="preview(this, 'prev4')">
  <div id="prev4"></div>

  <p>Gambar 5</p>
  <input type="file" id="image5Input" accept="image/*" onchange="preview(this, 'prev5')">
  <div id="prev5"></div>

  <button onclick="submitProperty(event)">Simpan</button>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyvozn3nlgCpNmnmSzeBGszSmH18TwJE-hYW1vtRxicYF-ZMOJ4cRN5tsZYF0F0piq5YA/exec';
  
  function preview(input, target) {
    const file = input.files[0];
    if (!file) return;
  
    const url = URL.createObjectURL(file);
    document.getElementById(target).innerHTML = `<img src="${url}">`;
  }
  
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      if (!file) return resolve('');
  
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }
  
  async function submitProperty(event) {
  
    if (!document.getElementById('mainImageInput').files[0]) {
      alert('Gambar utama wajib!');
      return;
    }
  
    const btn = event.target;
    btn.disabled = true;
    btn.innerText = 'Uploading...';
  
    try {
  
      const mainImage = await toBase64(document.getElementById('mainImageInput').files[0]);
      const img2 = await toBase64(document.getElementById('image2Input').files[0]);
      const img3 = await toBase64(document.getElementById('image3Input').files[0]);
      const img4 = await toBase64(document.getElementById('image4Input').files[0]);
      const img5 = await toBase64(document.getElementById('image5Input').files[0]);
  
      // ✅ INI YANG TADI KURANG
      const payload = {
        category: document.getElementById('categorySelect').value,
        sales: document.getElementById('salesName').value,
        'nama property': document.getElementById('propertyName').value,
        harga: document.getElementById('price').value,
        kontak: document.getElementById('contact').value,
        kt: document.getElementById('kt').value,
        km: document.getElementById('km').value,
        lt: document.getElementById('lt').value,
        lokasi: document.getElementById('location').value,
        spesifikasi: document.getElementById('specification').value,
  
        'gambar utama': mainImage,
        gambar2: img2,
        gambar3: img3,
        gambar4: img4,
        gambar5: img5
      };
  
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });
  
      const result = await res.json();
  
      if (result.success) {
        alert('✅ Berhasil disimpan');
        location.reload();
      } else {
        alert('❌ Gagal: ' + result.error);
      }
  
    } catch (err) {
      alert('Error: ' + err);
    }
  
    btn.disabled = false;
    btn.innerText = 'Simpan';
  }
  </script>

</body>
</html>
