<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Login - BMpro Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      max-width: 400px;
      width: 100%;
    }
    .login-card {
      background: white;
      border-radius: 30px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .logo i { font-size: 2.5rem; color: white; }
    h2 { color: #2c3e50; margin-bottom: 8px; }
    p { color: #666; font-size: 0.8rem; margin-bottom: 30px; }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 0.85rem;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:active { transform: scale(0.98); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error-msg {
      color: #e74c3c;
      font-size: 0.75rem;
      margin-top: 12px;
      display: none;
    }
    .demo-info {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 0.7rem;
      color: #888;
    }
    .alert-attempt {
      background: #fff3cd;
      border: 1px solid #ffecb5;
      color: #856404;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.7rem;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <i class="fas fa-building"></i>
      </div>
      <h2>BMpro Admin</h2>
      <p>Login untuk mengelola properti</p>
      
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
      </div>
      
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password" autocomplete="off">
      </div>
      
      <button id="loginBtn" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      
      <div class="error-msg" id="errorMsg"></div>
      <div class="alert-attempt" id="attemptAlert"></div>
      
      <div class="demo-info">
        <strong>Info Keamanan:</strong><br>
        Validasi akun dilakukan melalui database terenkripsi
      </div>
    </div>
  </div>
  
  <script>
    // =====================================================
    // 🔐 KONFIGURASI - GANTI URL INI DENGAN APPS SCRIPT YANG VALID!
    // =====================================================
    const LOGIN_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtsvCHLatBOrt3U4aPQHhM8RLLvDXukJq_H_YthXerDY_axQDDPpqpPYSdY44QeFzh/exec';
    
    // Batasan percobaan login (security)
    const MAX_ATTEMPTS = 5;
    const BLOCK_DURATION = 5 * 60 * 1000; // 5 menit
    
    let loginAttempts = 0;
    let blockUntil = null;
    
    // =====================================================
    // 🔐 FUNGSI LOGIN UTAMA
    // =====================================================
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const attemptAlert = document.getElementById('attemptAlert');
      const loginBtn = document.getElementById('loginBtn');
      
      // Bersihkan error sebelumnya
      errorMsg.style.display = 'none';
      attemptAlert.style.display = 'none';
      
      // Validasi input kosong
      if (!username || !password) {
        errorMsg.style.display = 'block';
        errorMsg.innerHTML = '❌ Username dan password wajib diisi!';
        return;
      }
      
      // Validasi panjang karakter (minimal)
      if (username.length < 3 || password.length < 3) {
        errorMsg.style.display = 'block';
        errorMsg.innerHTML = '❌ Username dan password minimal 3 karakter!';
        return;
      }
      
      // Cek apakah sedang dalam masa blokir
      if (blockUntil && new Date().getTime() < blockUntil) {
        const remainingMinutes = Math.ceil((blockUntil - new Date().getTime()) / 60000);
        errorMsg.style.display = 'block';
        errorMsg.innerHTML = `⚠️ Terlalu banyak percobaan gagal. Coba lagi dalam ${remainingMinutes} menit.`;
        return;
      } else if (blockUntil) {
        // Reset blokir jika sudah lewat waktu
        blockUntil = null;
        loginAttempts = 0;
      }
      
      // Disable tombol selama proses
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';
      
      try {
        // 📤 Kirim request ke GAS (backend)
        const payload = {
          action: 'login',
          username: username,
          password: password,
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent.substring(0, 100) // Untuk logging
        };
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // Timeout 15 detik
        
        const response = await fetch(LOGIN_SCRIPT_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        // 📥 Baca response dari GAS
        const result = await response.json();
        
        if (result.success && result.data) {
          // ✅ LOGIN BERHASIL
          
          // Reset percobaan gagal
          loginAttempts = 0;
          
          // Simpan session SECURE (gunakan sessionStorage, bukan localStorage)
          // SessionStorage lebih aman karena akan hilang saat tab ditutup
          const sessionData = {
            username: result.data.username,
            role: result.data.role,
            token: result.data.token,
            loginTime: new Date().toISOString(),
            expiresAt: result.data.expiresAt || new Date(Date.now() + 8 * 3600000).toISOString() // 8 jam
          };
          
          // Gunakan sessionStorage (bukan localStorage) untuk keamanan lebih
          sessionStorage.setItem('bmpro_user', JSON.stringify(sessionData));
          
          // Optional: simpan juga flag bahwa ini login dari session
          sessionStorage.setItem('bmpro_auth_token', result.data.token);
          
          // Redirect ke halaman admin
          window.location.href = 'admin_form.html';
          
        } else {
          // ❌ LOGIN GAGAL
          loginAttempts++;
          
          // Tampilkan pesan error
          errorMsg.style.display = 'block';
          errorMsg.innerHTML = `❌ ${result.message || 'Username atau password salah!'} (Percobaan ${loginAttempts}/${MAX_ATTEMPTS})`;
          
          // Cek apakah sudah mencapai batas maksimal
          if (loginAttempts >= MAX_ATTEMPTS) {
            blockUntil = new Date().getTime() + BLOCK_DURATION;
            attemptAlert.style.display = 'block';
            attemptAlert.innerHTML = `⚠️ Anda telah mencapai batas maksimal percobaan (${MAX_ATTEMPTS}x). Akun akan diblokir sementara selama 5 menit.`;
            
            // Kirim notifikasi ke sheet (via GAS) untuk audit
            await fetch(LOGIN_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                action: 'logFailedAttempt',
                username: username,
                attempts: loginAttempts,
                timestamp: new Date().toISOString()
              })
            }).catch(e => console.log('Logging failed:', e));
            
            loginBtn.disabled = true;
            setTimeout(() => {
              if (blockUntil && new Date().getTime() >= blockUntil) {
                loginBtn.disabled = false;
                attemptAlert.style.display = 'none';
                errorMsg.style.display = 'none';
                loginAttempts = 0;
                blockUntil = null;
              }
            }, BLOCK_DURATION);
          } else {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
          }
        }
        
      } catch (error) {
        console.error('Login error:', error);
        
        let errorMessage = 'Gagal terhubung ke server. ';
        if (error.name === 'AbortError') {
          errorMessage += 'Koneksi timeout. Periksa koneksi internet Anda.';
        } else if (error.message.includes('Failed to fetch')) {
          errorMessage += 'Tidak dapat terhubung ke server. Periksa URL Apps Script.';
        } else {
          errorMessage += 'Silakan coba lagi.';
        }
        
        errorMsg.style.display = 'block';
        errorMsg.innerHTML = `⚠️ ${errorMessage}`;
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    }
    
    // =====================================================
    // 🔐 CEK SESSION YANG SUDAH ADA
    // =====================================================
    async function checkExistingSession() {
      const sessionData = sessionStorage.getItem('bmpro_user');
      
      if (!sessionData) {
        return false;
      }
      
      try {
        const userData = JSON.parse(sessionData);
        
        // Cek apakah session sudah expired
        if (userData.expiresAt && new Date(userData.expiresAt) < new Date()) {
          // Session expired, hapus
          sessionStorage.removeItem('bmpro_user');
          sessionStorage.removeItem('bmpro_auth_token');
          return false;
        }
        
        // Validasi token ke server (optional, untuk keamanan ekstra)
        // Jika ingin lebih aman, bisa uncomment kode di bawah
        /*
        const response = await fetch(LOGIN_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'validateToken',
            token: userData.token
          })
        });
        const result = await response.json();
        
        if (!result.valid) {
          sessionStorage.removeItem('bmpro_user');
          sessionStorage.removeItem('bmpro_auth_token');
          return false;
        }
        */
        
        // Session valid, redirect ke halaman admin
        if (userData.role === 'admin' || userData.role === 'sales') {
          window.location.href = 'admin_form.html';
          return true;
        }
        
        return false;
        
      } catch (e) {
        console.error('Session check error:', e);
        sessionStorage.removeItem('bmpro_user');
        sessionStorage.removeItem('bmpro_auth_token');
        return false;
      }
    }
    
    // =====================================================
    // 🔐 FUNGSI KEAMANAN TAMBAHAN
    // =====================================================
    
    // Proteksi dari console injection
    function protectConsole() {
      // Nonaktifkan akses ke localStorage/sessionStorage dari console (basic protection)
      Object.defineProperty(window, 'sessionStorage', {
        get: function() {
          throw new Error('Akses sessionStorage tidak diizinkan dari console');
        }
      });
      
      // Override console.log di production (optional)
      if (window.location.hostname !== 'localhost') {
        console.log = function() {};
        console.info = function() {};
      }
    }
    
    // Clear sensitive data saat window ditutup
    window.addEventListener('beforeunload', function() {
      // Hapus token sementara saat refresh
      // SessionStorage akan tetap ada, tapi kita bisa hapus jika diperlukan
      if (!sessionStorage.getItem('keep_session')) {
        // Biarkan sessionStorage tetap karena akan hilang saat tab ditutup
      }
    });
    
    // Proteksi dari XSS dengan sanitasi input
    function sanitizeInput(input) {
      return input.replace(/[<>]/g, '');
    }
    
    // Event listener untuk tombol Enter
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        doLogin();
      }
    });
    
    // Proteksi: hapus session saat tab ditutup
    window.addEventListener('pagehide', function() {
      // Optional: hapus session saat tab ditutup
      // sessionStorage.removeItem('bmpro_user');
    });
    
    // Cek apakah sudah login saat halaman dimuat
    checkExistingSession();
    
    // Tambahkan proteksi untuk input (sanitasi)
    document.getElementById('username').addEventListener('input', function(e) {
      this.value = sanitizeInput(this.value);
    });
    
  </script>
</body>
</html>
